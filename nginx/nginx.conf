events {}

http {
  upstream enterprise_api_upstream {
    least_conn;
    server app1:8080 max_fails=3 fail_timeout=2s;
    server app2:8080 max_fails=3 fail_timeout=2s;
    keepalive 32;
  }

  server {
    listen 80;

    # Health del LB
    location /lb-health {
      return 200 "OK\n";
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-Id $http_x_correlation_id;
      # útil para debug: ver qué instancia respondió
      add_header X-Upstream $upstream_addr always;

      proxy_pass http://enterprise_api_upstream;
    }
  }
}