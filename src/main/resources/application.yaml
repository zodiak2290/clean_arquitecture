spring:
  application:
    name: enterprise-clean-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/enterprise_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234567}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: redis
  data:
    redis:
      host: redis
      port: 6379
cache:
    ttl: 60000
app:
   storage:
     provider: ${APP_STORAGE_PROVIDER:local}
     bucket: ${APP_STORAGE_BUCKET:}
   aws:
     region: ${APP_AWS_REGION:us-west-2}
   cache:
     provider: ${APP_CACHE_PROVIDER:inmemory}
management:
   endpoints:
     web:
       exposure:
         include: health,info,prometheus
   endpoint:
     health:
       show-details: always
       probes:
         enabled: true
   metrics:
     enable:
       jvm: true
       process: true
       system: true
     distribution:
       percentiles-histogram:
         http.server.requests: true
       percentiles:
         http.server.requests: 0.5,0.85,0.95,0.99